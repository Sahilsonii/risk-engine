version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: risk_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecretroot
      POSTGRES_DB: risk_engine
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d risk_engine"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: risk_redis
    command: redis-server --save 60 1 --loglevel notice
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: risk_api
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: api_service
      DB_PASS: api_service_pass
      DB_NAME: risk_engine
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: risk_worker
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: api_service
      DB_PASS: api_service_pass
      DB_NAME: risk_engine
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  simulator:
    build:
      context: ./backend
      dockerfile: Dockerfile.simulator
    container_name: risk_simulator
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: api_service
      DB_PASS: api_service_pass
      DB_NAME: risk_engine
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SIMULATE_INTERVAL_MS: 3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
        VITE_API_URL: http://localhost:4000
    container_name: risk_frontend
    env_file: .env
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
